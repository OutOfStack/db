# Example server configuration file
# Copy this to config.yaml and modify as needed

engine:
  type: "in_memory"

# WAL is disabled by default for backward compatibility.
wal:
  enabled: false
  data_dir: "data"
  sync: "everysec"          # always, everysec, or no
  segment_size: 64          # MiB
  snapshot_interval: 5m

network:
  address: "127.0.0.1:3223"
  max_connections: 100
  max_message_size: 4
  idle_timeout: 5m

logging:
  level: "info"
  output: ""  # Empty for stdout, or specify file path like "/var/log/db.log"
